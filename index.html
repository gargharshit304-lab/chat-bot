<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Chat — Minimal</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app">
    <aside class="sidebar" role="navigation">
      <div class="sidebar-top">
        <div class="brand">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="6" fill="url(#g)"/></svg>
          <span class="brand-text">AI Chat</span>
        </div>
        <button id="newChat" class="btn new-chat" title="New chat"> 
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>New chat</span>
        </button>
      </div>

      <div class="chats" id="chatsList" role="list">
        <div class="empty">No previous chats — start a conversation</div>
      </div>

      <div class="sidebar-footer">
        <small>Local demo · Dark UI</small>
      </div>
    </aside>

    <main class="main" role="main">
      <header class="main-header">
        <div class="title-wrap">
          <h1>Conversation</h1>
          <div id="status" class="status">Ready</div>
        </div>
        <div class="header-actions">
          <!-- placeholder for icons -->
          <button class="icon-btn" title="Theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="inputForm" class="input-area" autocomplete="off">
        <div class="input-wrapper">
          <textarea id="input" placeholder="Type a message and press Enter..." rows="1"></textarea>
          <button id="sendBtn" class="btn send" type="submit" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2l-7 20 1-7 7-7-1-6z" stroke="currentColor" stroke-width="0"/></svg>
          </button>
        </div>
      </form>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
